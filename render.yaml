services:
  - type: web
    name: zoom-transcriber
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: API_KEY
        sync: false           # Paste your AssemblyAI key in Render dashboard
      - key: RECORDINGS_DIR
        value: /app/recordings
      - key: PORT
        value: 10000          # Explicit port — must match Dockerfile EXPOSE and uvicorn
    disk:
      name: recordings
      mountPath: /app/recordings
      sizeGB: 10