services:
  - type: web
    name: zoom-transcriber
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # paid plan — required for disk
    envVars:
      - key: API_KEY
        sync: false
      - key: RECORDINGS_DIR
        value: /app/recordings
      - key: PORT
        value: "10000"
    disk:
      name: recordings
      mountPath: /app/recordings
      sizeGB: 10