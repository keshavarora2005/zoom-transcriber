services:
  - type: web
    name: zoom-transcriber
    runtime: docker           # ← Docker runs as root during build, so apt-get works
    dockerfilePath: ./Dockerfile
    envVars:
      - key: API_KEY
        sync: false           # Paste your AssemblyAI key in Render dashboard
      - key: RECORDINGS_DIR
        value: /app/recordings
    disk:
      name: recordings
      mountPath: /app/recordings
      sizeGB: 10