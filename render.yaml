services:
  - type: web
    name: zoom-transcriber
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: python main.py
    envVars:
      - key: API_KEY
        sync: false          # You'll paste this manually in Render dashboard
      - key: PORT
        generateValue: false # Render injects this automatically
    disk:
      name: recordings
      mountPath: /app/recordings
      sizeGB: 10             # Persistent disk so recordings survive restarts